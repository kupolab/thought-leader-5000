<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Leader 5000</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --li-blue: #0a66c2;
  --li-blue-dark: #004182;
  --li-blue-light: #e8f3ff;
  --li-bg: #f3f2ef;
  --li-surface: #ffffff;
  --li-border: #e0dfdc;
  --li-text: #000000e6;
  --li-muted: #00000099;
  --li-hint: #00000066;
  --li-green: #057642;
  --li-red: #c0392b;
  --li-red-bg: #fdecea;
  --li-red-light: #fdecea;
  --li-gray-bg: #f3f2ef;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--li-bg);
  color: var(--li-text);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--li-blue);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: staggerIn 0.2s ease-out both;
}
.header-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.header-logo {
  font-size: 16px; font-weight: 700;
  background: white; color: var(--li-blue);
  padding: 4px 8px; border-radius: 4px;
}
.header-app-name { font-size: 16px; font-weight: 700; color: white; margin-left: 10px; }
.header-center {
  font-size: 13px; color: white; opacity: 0.8;
  text-align: center; flex: 1; padding: 0 16px;
}
.header-right {
  flex-shrink: 0; width: 340px; text-align: right;
  height: 48px; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: flex-end;
}
.header-quote {
  font-size: 11px; color: white; opacity: 0.65;
  font-style: italic; line-height: 1.4;
  transition: opacity 0.3s ease;
}
.header-quote.fading { opacity: 0; }

/* Content */
.content { max-width: 680px; margin: 0 auto; padding: 0 16px 40px; }

/* Mode selector */
.mode-selector {
  display: flex; gap: 8px; justify-content: center;
  margin: 16px auto;
  animation: staggerIn 0.2s ease-out 0.15s both;
}
.mode-btn {
  border-radius: 20px; padding: 10px 24px; font-size: 14px;
  font-weight: 500; cursor: pointer; border: 1px solid var(--li-border);
  background: white; color: var(--li-muted);
  font-family: inherit; transition: all 0.2s;
}
.mode-btn:hover { background: var(--li-blue-light); }
.mode-btn.active {
  background: var(--li-blue); color: white; border-color: var(--li-blue);
}
.mode-btn.active:hover { background: var(--li-blue-dark); }

/* Cards */
.card {
  background: var(--li-surface); border: 1px solid var(--li-border);
  border-radius: 8px; padding: 14px 16px; margin-bottom: 10px;
}

/* Section label */
.section-label {
  font-size: 11px; text-transform: uppercase; color: var(--li-muted);
  letter-spacing: 0.5px; font-weight: 500;
}

/* Buttons */
.btn-primary {
  background: var(--li-blue); color: white; border: none;
  border-radius: 20px; padding: 8px 20px; font-size: 13px;
  font-weight: 500; cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.btn-primary:hover { background: var(--li-blue-dark); }
.btn-primary:disabled { background: #b0b0b0; cursor: not-allowed; }

.btn-outline {
  background: white; border: 1.5px solid var(--li-blue);
  color: var(--li-blue); border-radius: 20px; padding: 8px 20px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.btn-outline:hover { background: var(--li-blue-light); }
.btn-outline:disabled { border-color: #b0b0b0; color: #b0b0b0; cursor: not-allowed; }

.btn-danger {
  background: white; border: 1.5px solid var(--li-red);
  color: var(--li-red); border-radius: 20px; padding: 8px 20px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.btn-danger:hover { background: var(--li-red-bg); }
.btn-danger:disabled { border-color: #b0b0b0; color: #b0b0b0; cursor: not-allowed; }

.btn-ghost {
  background: none; border: none; color: var(--li-muted);
  padding: 4px 8px; border-radius: 4px; cursor: pointer;
  font-family: inherit; font-size: 13px; transition: all 0.15s;
}
.btn-ghost:hover { background: var(--li-gray-bg); }

/* Centered button container */
.btn-center {
  display: flex; justify-content: center; margin: 10px 0;
}
.btn-center .btn-primary,
.btn-center .btn-danger {
  width: 100%; max-width: 280px;
}

/* Inputs */
textarea, input[type="text"], input[type="password"] {
  border: 1px solid var(--li-border); border-radius: 8px;
  padding: 10px 12px; font-size: 13px; font-family: inherit;
  width: 100%; resize: vertical; color: var(--li-text);
  transition: border-color 0.15s;
}
textarea:focus, input[type="text"]:focus, input[type="password"]:focus {
  border-color: var(--li-blue); outline: none;
}

/* Slot rows */
.slot-row {
  display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px;
}
.slot-label {
  width: 52px; min-width: 52px; text-align: right;
  font-size: 11px; color: var(--li-hint); padding-top: 8px;
  font-weight: 500;
}
.slot-content { flex: 1; min-width: 0; }
.slot-pill {
  background: var(--li-gray-bg); border: 1px solid var(--li-border);
  border-radius: 8px; padding: 8px 12px; font-size: 13px;
  color: var(--li-text); line-height: 1.5;
  transition: all 0.2s; cursor: default;
}
.slot-pill.spinning { animation: slotBounce 0.1s ease-in-out; }
.slot-toggle {
  font-size: 11px; color: var(--li-blue); cursor: pointer;
  margin-top: 4px; display: inline-block;
}
.slot-toggle:hover { text-decoration: underline; }
.slot-spin { padding-top: 6px; }
.slot-spin .btn-ghost { transition: transform 0.2s; }
.slot-spin .btn-ghost:hover { transform: rotate(45deg); }
.slot-spin .btn-ghost.spinning { animation: spinRotate 0.5s ease-out; }

@keyframes spinRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes slotBounce {
  0% { transform: translateY(0); opacity: 0.5; }
  50% { transform: translateY(-2px); opacity: 0.7; }
  100% { transform: translateY(0); opacity: 1; }
}

/* Avatar */
.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--li-blue); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; flex-shrink: 0;
}
.avatar-large { width: 48px; height: 48px; font-size: 18px; }

/* Post card */
.post-header { display: flex; gap: 10px; margin-bottom: 4px; }
.post-name { font-size: 14px; font-weight: 500; color: var(--li-text); }
.post-subtitle { font-size: 12px; color: var(--li-muted); }
.post-timestamp { font-size: 11px; color: var(--li-hint); }
.post-body {
  font-size: 13px; line-height: 1.65; white-space: pre-line;
  margin-top: 10px; color: var(--li-text);
}
.post-divider { border: none; border-top: 1px solid var(--li-border); margin: 10px 0; }

/* Reactions bar */
.reactions-bar {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--li-muted); margin-bottom: 6px;
}

/* Action bar */
.action-bar {
  display: flex; justify-content: space-around;
  border-top: 1px solid var(--li-border);
  padding-top: 6px;
}
.action-bar .btn-ghost { font-size: 12px; }
.action-bar .btn-ghost.liked { color: var(--li-blue); font-weight: 500; }

/* Share card */
.share-card {
  border: 1.5px dashed var(--li-blue); border-radius: 8px;
  padding: 14px 16px; margin-bottom: 10px;
}
.share-label {
  font-size: 11px; text-transform: uppercase; color: var(--li-blue);
  font-weight: 500; margin-bottom: 10px;
}
.share-text {
  font-size: 13px; color: var(--li-text); line-height: 1.7;
  white-space: pre-line; background: var(--li-gray-bg);
  padding: 10px 12px; border-radius: 6px; margin-bottom: 10px;
}
.copy-confirm {
  font-size: 13px; color: var(--li-green); margin-top: 8px;
  animation: cardIn 0.2s ease-out;
}

/* Roast result */
.roast-result {
  border-left: 3px solid var(--li-red);
  border-radius: 0 8px 8px 0;
}
.roast-text-block {
  background: var(--li-red-bg); border-left: 3px solid var(--li-red);
  border-radius: 0 8px 8px 0; padding: 12px 14px;
  font-size: 14px; color: var(--li-text); line-height: 1.7;
  white-space: pre-line;
}
.archetype-badge {
  background: var(--li-gray-bg); border-radius: 8px;
  padding: 10px 12px; margin-top: 10px;
}
.subtext-pill {
  background: var(--li-gray-bg); border-radius: 8px;
  padding: 8px 12px; margin-top: 6px; font-size: 13px;
  line-height: 1.5;
}

/* Headline result */
.headline-before {
  background: var(--li-gray-bg); padding: 12px; border-radius: 8px; margin-bottom: 10px;
}
.headline-after {
  background: var(--li-blue-light); border-left: 3px solid var(--li-blue);
  border-radius: 0 8px 8px 0; padding: 14px; margin-bottom: 10px;
}
.headline-new { font-size: 18px; font-weight: 500; color: var(--li-text); margin-top: 8px; }
.score-row {
  display: flex; gap: 12px; font-size: 12px; color: var(--li-green);
  flex-wrap: wrap; margin-top: 8px;
}
.score-row span { white-space: nowrap; }
.score-row .old-score {
  text-decoration: line-through; color: var(--li-red); margin-right: 4px;
}

/* Skeleton loader */
.skeleton {
  background: linear-gradient(90deg, var(--li-gray-bg) 25%, #e8e7e4 50%, var(--li-gray-bg) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px; height: 16px; margin-bottom: 8px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.loading-message {
  font-size: 12px; color: var(--li-muted); text-align: center; padding: 8px 0;
}

/* Button groups */
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* Rewrite display */
.rewrite-card {
  background: var(--li-blue-light); border-left: 3px solid var(--li-blue);
  border-radius: 0 8px 8px 0; padding: 12px 14px; margin-top: 10px;
}

/* Footer */
.footer {
  text-align: center; padding: 24px 0 32px; font-size: 11px;
  color: var(--li-muted); line-height: 2;
}
.footer a { color: var(--li-blue); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Settings panel */
.settings-panel {
  background: var(--li-surface); border: 1px solid var(--li-border);
  border-radius: 8px; padding: 14px 16px; margin: 10px auto 0;
  max-width: 480px; animation: cardIn 0.2s ease-out;
}
.settings-panel .section-label { margin-bottom: 12px; }
.api-key-note { font-size: 11px; color: var(--li-hint); margin-top: 6px; }

/* Checkbox toggle */
.toggle-row {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
}
.toggle-row input[type="checkbox"] { accent-color: var(--li-blue); }
.toggle-row label { font-size: 13px; color: var(--li-text); cursor: pointer; }

/* Privacy note */
.privacy-note { font-size: 11px; color: var(--li-hint); margin-top: 8px; }

.ai-label { font-size: 11px; color: var(--li-muted); text-align: center; margin-top: 4px; }

/* Thought leadership score bar */
.tl-score-bar {
  height: 6px; border-radius: 3px; background: var(--li-border);
  overflow: hidden; margin-top: 4px;
}
.tl-score-fill {
  height: 100%; border-radius: 3px;
  transition: width 1s ease-out;
}

/* Animations */
@keyframes staggerIn {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes cardIn {
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
.card-enter { animation: cardIn 0.2s ease-out; }

/* Mode panel */
.mode-panel { animation: staggerIn 0.2s ease-out 0.3s both; }

/* Typewriter cursor */
.typewriter-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--li-blue); margin-left: 2px;
  animation: blink 0.7s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Toast notification */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--li-text); color: white; padding: 10px 20px;
  border-radius: 8px; font-size: 12px; z-index: 1000;
  animation: toastIn 0.3s ease-out;
  max-width: 90vw; text-align: center;
}
@keyframes toastIn {
  0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Welcome modal */
.welcome-overlay {
  min-height: 100vh; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; animation: fadeIn 0.15s ease-out;
}
.welcome-modal {
  background: white; border-radius: 8px; max-width: 420px; width: 100%;
  padding: 24px; animation: modalIn 0.2s ease-out;
}
@keyframes modalIn {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}
.welcome-modal.dismissing { animation: modalOut 0.15s ease-in forwards; }
.welcome-overlay.dismissing { animation: fadeOut 0.15s ease-in forwards; }
@keyframes modalOut {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.95); }
}
@keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }

/* Responsive */
@media (max-width: 700px) {
  .content { padding: 0 8px 40px; }
  .slot-label { width: 40px; min-width: 40px; font-size: 10px; }
  .mode-btn { padding: 8px 16px; font-size: 13px; }
  .mode-selector { gap: 6px; margin: 12px auto; }
  .header-center, .header-right { display: none; }
}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── Slot data ──────────────────────────────────────────────
const HOOKS = [
  "I was rejected by 47 companies. Here's what I learned:",
  "I cried in an Uber. Here's what it taught me about leadership:",

  "My therapist told me something that changed how I do business:",
  "I turned down a $2M acquisition offer. Here's why:",
  "I got feedback that I was 'too intense.' I used it as fuel.",

const TOPICS = [
  "Failure is just success that hasn't invoiced yet.",
  "The best time to start was yesterday. The second best is this post.",
  "Soft skills aren't soft. They're actually hard. Think about it.",
  "Hustle culture is dead. I killed it. Here's my 4am routine.",
  "Your network is your net worth. (Net worth not included.)",
  "I don't have a boss. I have a co-visionary.",
  "Work-life balance is a myth I sold for $2.4M.",
  "Imposter syndrome means you're growing. Keep going.",
  "The most dangerous phrase in business: 'that's how we've always done it.'",
  "Stop asking for permission. Start asking for forgiveness. Then invoice.",
  "Your comfort zone is a subscription you keep renewing. Cancel it.",
  "Rejection is just redirection with better branding.",
  "The difference between a job and a calling is your LinkedIn bio.",
  "Nobody remembers the person who played it safe. Post anyway.",
  "Vulnerability is a competitive advantage. I put it in my deck.",
];
const INDUSTRIES = [
  "Web3 / AI / The Metaverse",
  "B2B SaaS / FinTech / RegTech",
  "The Creator Economy",
  "Conscious Leadership",
  "Disruptive Innovation",
  "Human-Centered Design Thinking",
  "The Future of Work",
  "Blockchain + Mindfulness",
  "AI-First Everything",
  "Quiet Quitting and Loud Returning",
  "Servant Leadership as a Service",
  "The Attention Economy",
  "Trauma-Informed Entrepreneurship",
  "Radical Transparency as a Business Model",
  "The Post-Hustle Renaissance",
];
const CLOSERS = [
  "What do YOU think? Drop a 🔥 below.",
  "Save this post. You'll need it someday.",
  "Tag someone who needs to hear this today.",
  "Repost if you agree. Your network deserves this.",
  "Follow me for more. I post daily. Relentlessly.",
  "Comment 'YES' if this resonated with you.",
  "Hit follow. I share what they don't want you to know.",
  "Double tap if you're building something great right now.",
  "I'm not saying I'm a visionary. I'm just saying.",
  "Like this post if you've ever felt like giving up. (Don't give up.)",
  "This took me 10 years to learn. You got it free. You're welcome.",
  "Be the post you wish to see in the world.",
  "I almost didn't share this. I'm glad I did.",
  "Drop a 💡 if this sparked something for you.",
  "The algorithm buries posts like this. Prove it wrong.",
];
const ALL_SLOTS = [HOOKS, TOPICS, INDUSTRIES, CLOSERS];
const SLOT_LABELS = ["Hook", "Topic", "Industry", "Closer"];
const SLOT_PLACEHOLDERS = [
  "e.g. I slept under my desk for a year...",
  "e.g. Vulnerability is just ROI with feelings...",
  "e.g. Trauma-Informed Crypto",
  "e.g. RT if you've ever sacrificed a meal for a deadline.",
];

// ── Subtitles ──────────────────────────────────────────────
const SUBTITLES = [
  "Disruptor · Visionary · Dog Dad · Coffee",
  "Change Agent · Keynote Speaker · I Don't Sleep",
  "Founder @ [Stealth] · Dad · Marathoner",
  "Chief Disruption Officer · Dog Dad · Oat Milk",
  "Evangelist · TEDx Alum · Cat Mom · Matcha",
  "Futurist · Angel Investor (1 Deal) · CrossFit Survivor",
  "Catalyst · Podcaster · Plant Parent · Cold Brew",
  "Strategist · LinkedIn Top Voice (Self-Declared) · Yoga",
  "Trailblazer · Author · Rescue Dog Advocate · Espresso",
  "Architect of Change · Coach · Amateur Chef · Kombucha",
];

// ── Buzzword list for scoring ──────────────────────────────
const BUZZWORDS = [
  "synergy", "synergies", "leverage", "leveraging", "leveraged",
  "passionate", "passion", "innovative", "innovation", "innovator",
  "disruptive", "disrupt", "disrupting", "disruption",
  "results-driven", "results driven", "thought leader", "thought leadership",
  "empower", "empowering", "empowerment",
  "unlock", "unlocking",
  "visionary", "transformative", "transformation",
  "strategic", "strategize", "holistic",
  "paradigm", "ecosystem", "scalable",
  "agile", "robust", "dynamic",
  "cutting-edge", "bleeding-edge", "best-in-class",
  "world-class", "next-gen", "game-changing",
  "stakeholder", "bandwidth", "circle back",
  "deep dive", "move the needle", "low-hanging fruit",
  "value-add", "value proposition", "evangelist",
  "rockstar", "ninja", "guru", "wizard",
  "hustle", "grind", "crushing it",
];

function countBuzzwords(text) {
  const lower = (text || "").toLowerCase();
  let count = 0;
  for (const bw of BUZZWORDS) {
    const regex = new RegExp('\\b' + bw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
    const matches = lower.match(regex);
    if (matches) count += matches.length;
  }
  return count;
}

// ── Archetype detector ─────────────────────────────────────
const ARCHETYPES = [
  { pattern: /passionate|passion/i, name: "The Passionate One™", desc: "Passionate about what, exactly?" },
  { pattern: /synerg|leverag|unlock/i, name: "The Corporate Poet", desc: "Speaks in business haiku." },
  { pattern: /intersect|junction|nexus/i, name: "The Intersection Person", desc: "Always at the intersection of two things." },
  { pattern: /results|driven|oriented/i, name: "The Results-Driven Driver of Results", desc: "As opposed to the results-averse professionals." },
  { pattern: /dad|dog|coffee|mom|mother/i, name: "The Full Human Being", desc: "Wants you to know they exist outside work." },
  { pattern: /15\+|20\+|10\+|years.{0,5}experience/i, name: "The Years of Experience Person", desc: "The plus sign is doing a lot of work here." },
  { pattern: /visionary|innovator|disrupt|thought.?leader/i, name: "The Self-Declared Visionary", desc: "If you have to say it..." },
  { pattern: /help|helping|empower/i, name: "The Helper", desc: "Helping unlock potential since potential became a noun." },
  { pattern: /authentic|genuine|real/i, name: "The Authentic One", desc: "Authenticity as a brand strategy." },
];

function detectArchetype(text) {
  const lower = (text || "").toLowerCase();
  for (const a of ARCHETYPES) {
    if (a.pattern.test(lower)) return a;
  }
  return { name: "The Enigma", desc: "Your profile defies categorization. Concerning." };
}

// ── Loading messages ───────────────────────────────────────
const LOADING_MESSAGES = [
  "Reading between the lines of your personal brand...",
  "Identifying synergies in your synergy language...",
  "Counting your pipe characters...",
  "Consulting the algorithm...",
  "Tallying buzzwords...",
  "Assessing your thought leadership potential...",
];

const BUILD_LOADING_MESSAGES = [
  "Consulting your personal brand...",
  "Adding unnecessary line breaks...",
  "Optimizing for the algorithm...",
  "Inserting strategic humblebrags...",
  "Sprinkling in vulnerability...",
  "Maximizing engagement bait...",
];

// ── Hater names ────────────────────────────────────────────
const HATER_NAMES = [

// ── API helper ─────────────────────────────────────────────
async function callAnthropic(apiKey, messages, maxTokens) {
  const hasOwnKey = apiKey && apiKey.startsWith("sk-ant-");
  const url = hasOwnKey
    ? "https://api.anthropic.com/v1/messages"
    : "https://thought-leader-5000.kristin-s-dahl.workers.dev";
  const headers = { "Content-Type": "application/json", "anthropic-version": "2023-06-01" };
  if (hasOwnKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const res = await fetch(url, {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: maxTokens,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API error ${res.status}: ${err}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

// ── Random helpers ─────────────────────────────────────────
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pickRandom(arr, exclude) {
  let pick;
  do { pick = arr[Math.floor(Math.random() * arr.length)]; } while (pick === exclude && arr.length > 1);
  return pick;
}

// ── Typewriter Hook ────────────────────────────────────────
function useTypewriter(text, speed = 12) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (!text) { setDisplayed(""); setDone(false); return; }
    setDisplayed(""); setDone(false);
    let i = 0;
    const interval = setInterval(() => {
      i += 1 + Math.floor(Math.random() * 2);
      if (i >= text.length) {
        setDisplayed(text);
        setDone(true);
        clearInterval(interval);
      } else {
        setDisplayed(text.slice(0, i));
      }
    }, speed);
    return () => clearInterval(interval);
  }, [text, speed]);
  return [displayed, done];
}

// ── Toast Hook ─────────────────────────────────────────────
function useToast() {
  const [toast, setToast] = useState(null);
  const timerRef = useRef(null);
  const show = (msg, duration = 3000) => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setToast(msg);
    timerRef.current = setTimeout(() => { setToast(null); timerRef.current = null; }, duration);
  };
  const el = toast ? React.createElement('div', { className: 'toast' }, toast) : null;
  return [show, el];
}

// MODE 1: BUILD A POST

function BuildPost({ apiKey }) {
  const [slots, setSlots] = useState(() => ALL_SLOTS.map(arr => arr[randInt(0, arr.length - 1)]));
  const [customs, setCustoms] = useState(["", "", "", ""]);
  const [isCustom, setIsCustom] = useState([false, false, false, false]);
  const [generatedPost, setGeneratedPost] = useState("");
  const [roastText, setRoastText] = useState("");
  const [generating, setGenerating] = useState(false);
  const [roasting, setRoasting] = useState(false);
  const [error, setError] = useState("");
  const [reactions, setReactions] = useState(null);
  const [copyMsg, setCopyMsg] = useState("");
  const [spinning, setSpinning] = useState([false, false, false, false]);
  const [spinCount, setSpinCount] = useState(0);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [liked, setLiked] = useState(false);
  const [fakeComment, setFakeComment] = useState("");
  const [haterName, setHaterName] = useState("");
  const [genKey, setGenKey] = useState(0);
  const [subtitle, setSubtitle] = useState(() => pickRandom(SUBTITLES));
  const loadingInterval = useRef(null);
  const [showToast, toastEl] = useToast();

  const [typedPost, typingDone] = useTypewriter(generatedPost, 10);

  const animateSpin = (slotIndex, finalValue) => {
    setSpinning(prev => { const n = [...prev]; n[slotIndex] = true; return n; });
    const arr = ALL_SLOTS[slotIndex];
    let cycles = 0;
    const totalCycles = 4 + Math.floor(Math.random() * 3);
    const interval = setInterval(() => {
      cycles++;
      if (cycles >= totalCycles) {
        clearInterval(interval);
        setSlots(prev => { const n = [...prev]; n[slotIndex] = finalValue; return n; });
        setSpinning(prev => { const n = [...prev]; n[slotIndex] = false; return n; });
      } else {
        setSlots(prev => { const n = [...prev]; n[slotIndex] = arr[Math.floor(Math.random() * arr.length)]; return n; });
      }
    }, 80);
  };

  const spinSlot = (i) => {
    if (spinning[i]) return;
    const finalValue = pickRandom(ALL_SLOTS[i], slots[i]);
    animateSpin(i, finalValue);
    const newCount = spinCount + 1;
    setSpinCount(newCount);
    if (SPIN_MILESTONES[newCount]) showToast(SPIN_MILESTONES[newCount]);
  };

  const spinAll = () => {
    const finals = ALL_SLOTS.map((arr, i) => pickRandom(arr, slots[i]));
    finals.forEach((val, i) => {
      setTimeout(() => animateSpin(i, val), i * 120);
    });
    const newCount = spinCount + 4;
    setSpinCount(newCount);
    const milestone = Object.keys(SPIN_MILESTONES).map(Number).find(m => m > spinCount && m <= newCount);
    if (milestone) showToast(SPIN_MILESTONES[milestone]);
  };

  const toggleCustom = (i) => {
    setIsCustom(prev => { const n = [...prev]; n[i] = !n[i]; return n; });
  };
  const setCustom = (i, val) => {
    setCustoms(prev => { const n = [...prev]; n[i] = val; return n; });
  };

  const getSlotValue = (i) => isCustom[i] ? customs[i] : slots[i];

  const generate = async () => {
    setGenerating(true); setError(""); setRoastText(""); setGeneratedPost("");
    setLiked(false); setFakeComment("");

    let msgIdx = 0;
    setLoadingMsg(BUILD_LOADING_MESSAGES[0]);
    loadingInterval.current = setInterval(() => {
      msgIdx = (msgIdx + 1) % BUILD_LOADING_MESSAGES.length;
      setLoadingMsg(BUILD_LOADING_MESSAGES[msgIdx]);
    }, 1400);

    try {
      const result = await callAnthropic(apiKey, [{
        role: "user",
        content: `You are generating content for a LinkedIn satire tool. Write a hilariously bad LinkedIn post that sounds EXACTLY like a real LinkedIn post — overly inspirational, humblebraggy, full of corporate buzzwords, with unnecessary line breaks and engagement bait.\n\nHook: "${getSlotValue(0)}"\nCore message: "${getSlotValue(1)}"\nIndustry context: "${getSlotValue(2)}"\nClosing line: "${getSlotValue(3)}"\n\nWrite 8-12 lines. No preamble. Just the post.`
      }], 400);
      setGeneratedPost(result);
      setGenKey(k => k + 1);
      setSubtitle(pickRandom(SUBTITLES, subtitle));
      setReactions({ fire: randInt(100, 500), clap: randInt(30, 150), think: randInt(10, 80), impressions: randInt(1000, 9999) });
    } catch (e) {
      setError(pickRandom(ERROR_MESSAGES) + "\n\n(" + e.message + ")");
    }
    clearInterval(loadingInterval.current);
    setGenerating(false);
  };

  const roast = async () => {
    if (!generatedPost) return;
    setRoasting(true); setError("");
    setHaterName(pickRandom(HATER_NAMES));
    try {
      const result = await callAnthropic(apiKey, [{
        role: "user",
        content: `You are the roast feature in a LinkedIn satire tool. Someone just "posted" this LinkedIn post. Respond in 2-3 sentences as a bitter but self-aware LinkedIn commenter — pedantic, slightly envious, funny through accuracy. You sometimes say "Source?" You are also, despite yourself, kind of a LinkedIn person.\n\nPost: "${generatedPost}"\n\nJust the comment. No preamble.`
      }], 200);
      setRoastText(result);
    } catch (e) {
      setError(pickRandom(ERROR_MESSAGES) + "\n\n(" + e.message + ")");
    }
    setRoasting(false);
  };

  const handleLike = () => {
    if (!liked) {
      setLiked(true);
      setReactions(prev => prev ? { ...prev, fire: prev.fire + 1 } : prev);
    }
  };
  const handleComment = () => { setFakeComment(pickRandom(FAKE_COMMENTS)); };
  const handleRepost = () => { showToast("Your 47 connections will see this. They didn't ask."); };
  const handleSend = () => { showToast("Sent to 0 people. As it should be."); };

  const buildShareText = () => {
    if (!generatedPost) return "";
    return generatedPost + "\n\n(Generated by Thought Leader 5000\nkupolab.github.io/thought-leader-5000)";
  };

  const copyToClipboard = () => {
    navigator.clipboard.writeText(buildShareText());
    setCopyMsg("Copied. Now go post it. You know you want to.");
    setTimeout(() => setCopyMsg(""), 3000);
  };

  const postToLinkedIn = () => {
    navigator.clipboard.writeText(buildShareText());
    setCopyMsg("Copied to clipboard! Paste it into LinkedIn.");
    setTimeout(() => setCopyMsg(""), 4000);
    window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://kupolab.github.io/thought-leader-5000", "_blank");

  return (
    <div>

            <div className="slot-label">{label}</div>

              {isCustom[i] ? (
                <div>
                  <textarea rows={2} placeholder={SLOT_PLACEHOLDERS[i]} value={customs[i]} onChange={e => setCustom(i, e.target.value)} />

            {!isCustom[i] && (

      {/* Generate button */}

        <button className="btn-primary" onClick={generate} disabled={generating}>

      </div>

      {error && <div className="card card-enter" style={{ color: "var(--li-red)", whiteSpace: "pre-line" }}>{error}</div>}

      {/* Loading */}
      {generating && (
        <div className="card card-enter">
          <div className="skeleton" style={{ width: "90%" }} />
          <div className="skeleton" style={{ width: "75%" }} />
          <div className="skeleton" style={{ width: "60%" }} />
          <div className="skeleton" style={{ width: "45%" }} />

      {/* Generated post */}
      {generatedPost && !generating && (

            <div className="avatar">YO</div>

            <div style={{ animation: "fadeIn 0.2s ease-out" }}>
              <hr className="post-divider" />
              <div className="reactions-bar">
                <span>🔥 {reactions.fire} &nbsp; 👏 {reactions.clap} &nbsp; 🤔 {reactions.think}</span>

        <div className="btn-group" style={{ justifyContent: "center", animation: "cardIn 0.15s ease-out 0.1s both" }}>

// MODE 2: ROAST MY PROFILE
// ════════════════════════════════════════════════════════════
function RoastProfile({ apiKey }) {
  const [headline, setHeadline] = useState("");
  const [about, setAbout] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [archetype, setArchetype] = useState(null);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [rewriteText, setRewriteText] = useState("");
  const [rewriting, setRewriting] = useState(false);
  const [copyMsg, setCopyMsg] = useState("");
  const [archetypeRevealed, setArchetypeRevealed] = useState(false);
  const loadingInterval = useRef(null);

  const tryExample = () => {
    setHeadline(EXAMPLE_HEADLINE);
    setAbout(EXAMPLE_ABOUT);
    setResult(null); setRewriteText(""); setArchetype(null); setArchetypeRevealed(false);
  };

  const roast = async () => {
    if (!headline.trim()) { setError("Please enter at least a headline."); return; }
    setLoading(true); setError(""); setResult(null); setRewriteText("");
    setArchetypeRevealed(false);
    setArchetype(detectArchetype(headline + " " + about));

    let msgIdx = 0;
    setLoadingMsg(LOADING_MESSAGES[0]);
    loadingInterval.current = setInterval(() => {
      msgIdx = (msgIdx + 1) % LOADING_MESSAGES.length;
      setLoadingMsg(LOADING_MESSAGES[msgIdx]);
    }, 1400);

    try {
      const raw = await callAnthropic(apiKey, [{
        role: "user",
        content: `You are the Profile Roaster in a LinkedIn satire tool. Roast this profile with surgical, affectionate humor. Be specific — quote their words back, name the clichés, reveal what the corporate language is actually signaling. Tone: a smart friend who loves them but won't let this slide. Not mean. Funny through accuracy.\n\nHeadline: "${headline}"\nAbout: "${about || '(not provided)'}"\n\nRespond in exactly this format:\nROAST: [2-4 paragraphs, specific to their words, under 200 words]\nSUBTEXT:\n* What you wrote: [phrase] / What it means: [translation]\n* What you wrote: [phrase] / What it means: [translation]\n* What you wrote: [phrase] / What it means: [translation]\n\nNo preamble. Stay under 300 words total.`
      }], 500);

      const roastMatch = raw.match(/ROAST:\s*([\s\S]*?)(?=SUBTEXT:)/i);
      const subtextMatch = raw.match(/SUBTEXT:\s*([\s\S]*)/i);
      const roastBody = roastMatch ? roastMatch[1].trim() : raw;
      const subtextLines = [];
      if (subtextMatch) {
        const lines = subtextMatch[1].trim().split("\n").filter(l => l.trim().startsWith("*"));
        for (const line of lines) {
          subtextLines.push(line.replace(/^\*\s*/, "").trim());
        }
      }
      setResult({ roast: roastBody, subtext: subtextLines });
      setTimeout(() => setArchetypeRevealed(true), 400);
    } catch (e) {
      setError(pickRandom(ERROR_MESSAGES) + "\n\n(" + e.message + ")");
    }
    clearInterval(loadingInterval.current);
    setLoading(false);
  };

  const rewrite = async () => {
    setRewriting(true);
    try {
      const text = await callAnthropic(apiKey, [{
        role: "user",
        content: `Rewrite this LinkedIn headline to be direct, specific, and human. No buzzwords. No pipe characters unless genuinely necessary. No "passionate about." Sound like a real person with a real job.\n\nWhat they do: "${about || headline}"\nExisting headline (if any): "${headline}"\n\nWrite ONE headline. Under 15 words. Just the headline, nothing else.`
      }], 80);
      setRewriteText(text.replace(/^["']|["']$/g, "").trim());
    } catch (e) {
      setRewriteText("Our headline generator is currently synergizing. Try again.");
    }
    setRewriting(false);
  };

  const shareText = result ? `I had my LinkedIn profile roasted by an AI.\n\nThe verdict: ${result.roast.split(/[.!]/)[0]}.\n\nMy LinkedIn archetype: ${archetype?.name || "Unknown"}\n\nkupolab.github.io/thought-leader-5000` : "";

  const copyShare = () => {
    navigator.clipboard.writeText(shareText);
    setCopyMsg("Copied. Now go post it. You know you want to.");
    setTimeout(() => setCopyMsg(""), 3000);
  };

  const reset = () => {
    setHeadline(""); setAbout(""); setResult(null);
    setArchetype(null); setRewriteText(""); setError("");
    setArchetypeRevealed(false);
  };

  return (
    <div>
      <div className="card">
        <div style={{ fontSize: 16, fontWeight: 500, marginBottom: 4 }}>Roast my LinkedIn profile</div>
        <div style={{ fontSize: 13, color: "var(--li-muted)", lineHeight: 1.6, marginBottom: 14 }}>
          Paste your headline, About section, or anything.<br />
          We'll tell you exactly what kind of LinkedIn person you are — with love.
        </div>
        <div style={{ marginBottom: 10 }}>
          <div className="section-label" style={{ marginBottom: 4 }}>YOUR HEADLINE</div>
          <textarea rows={2} value={headline} onChange={e => setHeadline(e.target.value)}
            placeholder="e.g. Passionate Leader | Innovator | Helping companies unlock their potential | Dad | Dog Dad | Coffee" />
        </div>
        <div style={{ marginBottom: 10 }}>
          <div className="section-label" style={{ marginBottom: 4 }}>YOUR ABOUT SECTION <span style={{ fontStyle: "italic", textTransform: "none", fontWeight: 400 }}>(optional)</span></div>
          <textarea rows={4} value={about} onChange={e => setAbout(e.target.value)}
            placeholder="e.g. I'm a results-driven professional with 15+ years of experience leveraging synergies at the intersection of..." />
        </div>
        <div className="btn-group">
          <button className="btn-primary" onClick={roast} disabled={loading}>
            {loading ? "Roasting..." : "Roast my profile"}
          </button>
          <button className="btn-outline" onClick={tryExample}>Try an example</button>
        </div>
        <div className="privacy-note">Your text is never stored.</div>
      </div>

      {loading && (
        <div className="card card-enter">
          <div className="skeleton" style={{ width: "90%" }} />
          <div className="skeleton" style={{ width: "75%" }} />
          <div className="skeleton" style={{ width: "60%" }} />
          <div className="loading-message">{loadingMsg}</div>
        </div>
      )}

      {error && !loading && <div className="card card-enter" style={{ color: "var(--li-red)", whiteSpace: "pre-line" }}>{error}</div>}

      {result && (
        <div className="card roast-result card-enter">
          <div className="post-header">
            <div className="avatar avatar-large" style={{ background: "var(--li-red)", fontSize: 22 }}>🔥</div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500 }}>The Roast</div>
              <div style={{ fontSize: 12, color: "var(--li-muted)" }}>Profile Analysis Division</div>
            </div>
          </div>

          <div className="roast-text-block" style={{ marginTop: 10 }}>{result.roast}</div>

          {archetype && archetypeRevealed && (
            <div className="archetype-badge" style={{ animation: "fadeIn 0.3s ease-out" }}>
              <span className="section-label">LINKEDIN ARCHETYPE: </span>
              <span style={{ fontSize: 13, fontWeight: 500, color: "var(--li-blue)" }}>
                {archetype.name}
              </span>
              <div style={{ fontSize: 12, color: "var(--li-muted)", marginTop: 2 }}>{archetype.desc}</div>
            </div>
          )}

          {archetype && !archetypeRevealed && (
            <div className="archetype-badge">
              <span className="section-label">LINKEDIN ARCHETYPE: </span>
              <span style={{ fontSize: 12, color: "var(--li-muted)" }}>Determining...</span>
              <div className="skeleton" style={{ width: "40%", marginTop: 4 }} />
            </div>
          )}

          {result.subtext.length > 0 && (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6 }}>What your profile is actually saying:</div>
              {result.subtext.map((s, i) => (
                <div className="subtext-pill card-enter" key={i} style={{ animationDelay: `${i * 0.1}s` }}>• {s}</div>
              ))}
            </div>
          )}

          <div className="btn-group">
            <button className="btn-danger" onClick={rewrite} disabled={rewriting}>
              {rewriting ? "Rewriting..." : "Write me a better headline"}
            </button>
            <button className="btn-primary" onClick={copyShare}>Share this roast</button>
            <button className="btn-outline" onClick={reset}>Roast another</button>
          </div>

          {rewriteText && (
            <div className="rewrite-card card-enter">
              <div style={{ fontSize: 13, fontWeight: 500 }}>A better headline:</div>
              <div style={{ fontSize: 12, color: "var(--li-muted)", marginBottom: 6 }}>What you'd say if you were being direct.</div>
              <div style={{ fontSize: 14, fontStyle: "italic", color: "var(--li-text)" }}>{rewriteText}</div>
            </div>
          )}
        </div>
      )}

      {result && (
        <div className="share-card card-enter">
          <div className="share-label">YOUR SHAREABLE ROAST</div>
          <div className="share-text">{shareText}</div>
          <div className="btn-group">
            <button className="btn-primary" onClick={copyShare}>Copy to clipboard</button>
            <button className="btn-outline" onClick={() => { navigator.clipboard.writeText(shareText); setCopyMsg("Copied to clipboard! Paste it into LinkedIn."); setTimeout(() => setCopyMsg(""), 4000); window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://kupolab.github.io/thought-leader-5000", "_blank"); }}>
              Post to LinkedIn ↗
            </button>
          </div>
          {copyMsg && <div className="copy-confirm">{copyMsg}</div>}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// MODE 3: FIX MY HEADLINE
// ════════════════════════════════════════════════════════════
function FixHeadline({ apiKey }) {
  const [userInput, setUserInput] = useState("");
  const [existingHeadline, setExistingHeadline] = useState("");
  const [linkedinMode, setLinkedinMode] = useState(false);
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [copyMsg, setCopyMsg] = useState("");

  const oldBuzzwords = countBuzzwords(existingHeadline);
  const oldPipes = (existingHeadline.match(/\|/g) || []).length;
  const newPipes = result ? (result.match(/\|/g) || []).length : 0;
  const newBuzzwords = result ? countBuzzwords(result) : 0;

  const oldScore = Math.min(100, oldBuzzwords * 12 + oldPipes * 8 + (existingHeadline.length > 60 ? 15 : 0));
  const newScore = Math.min(100, newBuzzwords * 12 + newPipes * 8);

  const scoreLabel = (s) => {
    if (s >= 80) return "Dangerously Thought-Leadery";
    if (s >= 50) return "Peak LinkedIn";
    if (s >= 20) return "Mildly Corporate";
    if (s > 0) return "Almost Human";
    return "Refreshingly Human";
  };

  const generate = async () => {
    if (!userInput.trim()) { setError("Tell us what you actually do first."); return; }
    setLoading(true); setError("");

    const prompt = linkedinMode
      ? `Rewrite this as a LinkedIn headline that's professional and polished but NOT cliché. Use one pipe character maximum. No "passionate about," "results-driven," "leveraging," or "synergies." Sound like a senior professional, not a buzzword generator.\n\nWhat they do: "${userInput}"\n\nWrite ONE headline. Under 15 words. Just the headline.`
      : `Rewrite this LinkedIn headline to be direct, specific, and human. No buzzwords. No pipe characters unless genuinely necessary. No "passionate about." Sound like a real person with a real job.\n\nWhat they do: "${userInput}"\nExisting headline (if any): "${existingHeadline || 'none'}"\n\nWrite ONE headline. Under 15 words. Just the headline, nothing else.`;

    try {
      const text = await callAnthropic(apiKey, [{ role: "user", content: prompt }], 80);
      setResult(text.replace(/^["']|["']$/g, "").trim());
    } catch (e) {
      setError(pickRandom(ERROR_MESSAGES) + "\n\n(" + e.message + ")");
    }
    setLoading(false);
  };

  const tryAnother = () => { setResult(""); generate(); };

  const shareText = `Rewrote my LinkedIn headline with an AI that refuses to use buzzwords.\n\nOld: ${existingHeadline || "Undisclosed"}\nNew: ${result}\n\nTurns out you can just say what you do.\n\nkupolab.github.io/thought-leader-5000`;

  const copyHeadline = () => {
    navigator.clipboard.writeText(result);
    setCopyMsg("Copied!");
    setTimeout(() => setCopyMsg(""), 3000);
  };
  const copyShare = () => {
    navigator.clipboard.writeText(shareText);
    setCopyMsg("Copied. Now go post it. You know you want to.");
    setTimeout(() => setCopyMsg(""), 3000);
  };

  return (
    <div>
      <div className="card">
        <div style={{ fontSize: 16, fontWeight: 500, marginBottom: 4 }}>Write me a real headline</div>
        <div style={{ fontSize: 13, color: "var(--li-muted)", lineHeight: 1.6, marginBottom: 14 }}>
          No buzzwords. No pipes. No "passionate about."<br />
          Just tell us what you actually do.
        </div>
        <div style={{ marginBottom: 10 }}>
          <div className="section-label" style={{ marginBottom: 4 }}>WHAT YOU ACTUALLY DO</div>
          <textarea rows={3} value={userInput} onChange={e => setUserInput(e.target.value)}
            placeholder="e.g. I help mid-size companies migrate to cloud infrastructure. I've been doing it for 12 years. I'm good at it." />
        </div>
        <div style={{ marginBottom: 10 }}>
          <div className="section-label" style={{ marginBottom: 4 }}>YOUR CURRENT HEADLINE <span style={{ fontStyle: "italic", textTransform: "none", fontWeight: 400 }}>(optional)</span></div>
          <textarea rows={2} value={existingHeadline} onChange={e => setExistingHeadline(e.target.value)}
            placeholder="e.g. Passionate Leader | Innovator | Helping companies unlock their potential" />
        </div>
        <div className="toggle-row">
          <input type="checkbox" id="linkedin-toggle" checked={linkedinMode} onChange={e => setLinkedinMode(e.target.checked)} />
          <label htmlFor="linkedin-toggle">Make it a little bit LinkedIn</label>
        </div>
        <div className="btn-group">
          <button className="btn-primary" onClick={generate} disabled={loading}>
            {loading ? "Writing..." : "Write my headline"}
          </button>
        </div>
      </div>

      {error && <div className="card card-enter" style={{ color: "var(--li-red)", whiteSpace: "pre-line" }}>{error}</div>}

      {result && (
        <div className="card card-enter">
          {existingHeadline && (
            <div className="headline-before">
              <div className="section-label" style={{ marginBottom: 4 }}>YOUR CURRENT HEADLINE</div>
              <div style={{ fontSize: 13, fontStyle: "italic", color: "var(--li-muted)" }}>{existingHeadline}</div>
            </div>
          )}
          <div className="headline-after">
            <div className="section-label" style={{ marginBottom: 4, color: "var(--li-blue)", fontWeight: 500 }}>YOUR NEW HEADLINE</div>
            <div className="headline-new">{result}</div>
          </div>
          <div className="score-row">
            <span>
              Buzzword count: {existingHeadline && oldBuzzwords > 0 && <span className="old-score">{oldBuzzwords}</span>}
              {newBuzzwords}
            </span>
            <span>·</span>
            <span>
              Pipe characters: {existingHeadline && oldPipes > 0 && <span className="old-score">{oldPipes}</span>}
              {newPipes}
            </span>
            <span>·</span>
            <span>Readability: Human</span>
          </div>
          {existingHeadline && oldScore > 0 && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 11, color: "var(--li-muted)", marginBottom: 4 }}>THOUGHT LEADERSHIP SCORE</div>
              <div style={{ display: "flex", gap: 12, alignItems: "center", fontSize: 12 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ color: "var(--li-red)", marginBottom: 2 }}>Before: {oldScore}/100 <span style={{ opacity: 0.7 }}>({scoreLabel(oldScore)})</span></div>
                  <div className="tl-score-bar">
                    <div className="tl-score-fill" style={{ width: `${oldScore}%`, background: "var(--li-red)" }} />
                  </div>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: "var(--li-green)", marginBottom: 2 }}>After: {newScore}/100 <span style={{ opacity: 0.7 }}>({scoreLabel(newScore)})</span></div>
                  <div className="tl-score-bar">
                    <div className="tl-score-fill" style={{ width: `${Math.max(newScore, 3)}%`, background: "var(--li-green)" }} />
                  </div>
                </div>
              </div>
            </div>
          )}
          <div className="btn-group">
            <button className="btn-primary" onClick={copyHeadline}>Copy headline</button>
            <button className="btn-outline" onClick={tryAnother}>Try a different angle</button>
            <button className="btn-outline" onClick={copyShare}>Share this</button>
          </div>
          {copyMsg && <div className="copy-confirm" style={{ marginTop: 6 }}>{copyMsg}</div>}
        </div>
      )}

      {result && (
        <div className="share-card card-enter">
          <div className="share-label">YOUR SHAREABLE HEADLINE</div>
          <div className="share-text">{shareText}</div>
          <div className="btn-group">
            <button className="btn-primary" onClick={copyShare}>Copy to clipboard</button>
            <button className="btn-outline" onClick={() => { navigator.clipboard.writeText(shareText); setCopyMsg("Copied to clipboard! Paste it into LinkedIn."); setTimeout(() => setCopyMsg(""), 4000); window.open("https://www.linkedin.com/sharing/share-offsite/?url=https://kupolab.github.io/thought-leader-5000", "_blank"); }}>
              Post to LinkedIn ↗
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
